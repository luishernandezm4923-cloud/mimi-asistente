name: Compilar APK de MIMI

on:
  workflow_dispatch:   # permite lanzarlo manualmente desde la pestaña "Actions"
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Descargar el código del repositorio
        uses: actions/checkout@v4

      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Configurar el SDK de Android
        uses: android-actions/setup-android@v3

      - name: Descargar el modelo de voz en español (Vosk)
        run: |
          mkdir -p app/src/main/assets
          curl -L -o model.zip https://alphacephei.com/vosk/models/vosk-model-small-es-0.42.zip
          unzip -q model.zip -d app/src/main/assets
          mv app/src/main/assets/vosk-model-small-es-0.42 app/src/main/assets/model-es
          rm model.zip

      - name: Configurar Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.4'

      - name: Compilar el APK (debug)
        id: build
        continue-on-error: true
        run: gradle assembleDebug --stacktrace 2>&1 | tee build_log.txt

      - name: Publicar el error como comentario del commit (solo si falló)
        if: steps.build.outcome == 'failure'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAIL=$(tail -c 60000 build_log.txt)
          BODY=$(python3 -c "import json,sys; print(json.dumps(sys.argv[1]))" "$TAIL")
          curl -s -X POST -H "Authorization: token $GITHUB_TOKEN" -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/commits/${{ github.sha }}/comments" \
            -d "{\"body\": \"### Log de compilación (falló)\n\`\`\`\n$(echo "$BODY" | sed 's/^"//;s/"$//')\n\`\`\`\"}"

      - name: Fallar el job si la compilación falló
        if: steps.build.outcome == 'failure'
        run: exit 1

      - name: Subir el APK como resultado descargable
        uses: actions/upload-artifact@v4
        with:
          name: mimi-apk
          path: app/build/outputs/apk/debug/app-debug.apk
